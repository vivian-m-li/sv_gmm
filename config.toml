# ==============================================================================
# SPLIT Configuration File
# ==============================================================================
# Copy this file to your working directory and fill in the paths and parameters
# for your environment before running.
# All path values are relative to the working directory unless they begin with /
# (absolute paths are also accepted).
# ==============================================================================


# ------------------------------------------------------------------------------
# [paths] — Input and output directories
# ------------------------------------------------------------------------------
[paths]

# input_dir: directory containing your input data (VCF/CSV callset, sample IDs, insert
# sizes, etc.).

# output_dir: directory where results will be written.

# stix_output_dir: sub-directory where raw STIX query output files are cached between runs.

# intermediate_output_dir: intermediate directory used during processing.
# On HPC clusters, point this to a fast local scratch filesystem.
# On a local machine, a subdirectory of output_dir is fine.

# local_intermediate_output_dir: local directory to store intermediate output files.
# Files are first written to intermediate_output_dir, then moved to
# local_intermediate_output_dir if they are not the same.

# default parameter values for running on 1kg data
input_dir = "data/1kg"
output_dir = "output/results"
stix_output_dir = "output/stix_output"
intermediate_output_dir = "/scratch/Users/vili4418/processed_svs"
local_intermediate_output_dir = "output/results/processed_svs"

# use these paths when running calibrate_model.py on 1kg data
# input_dir = "data/calibration"
# output_dir = "output/calibration/results"
# stix_output_dir = "output/calibration/stix_output"
# intermediate_output_dir = "output/calibration/calibration_outputs"

# use these paths when running calibrate_model.py on synthetic data
# input_dir = "data/synthetic_calibration"
# output_dir = "output/synthetic_calibration/results"
# stix_output_dir = "output/synthetic_calibration/stix_output"
# intermediate_output_dir = "output/synthetic_calibration/calibration_outputs"

# use these paths when running synthetic_tests.py
# output_dir = "output/synthetic_tests"

# use these paths when running get_insert_sizes
# intermediate_output_dir = "/scratch/Users/vili4418/insert_size_files"

# ------------------------------------------------------------------------------
# [input_files] — Files expected inside input_dir
# ------------------------------------------------------------------------------
[input_files]

# VCF or CSV file listing structural variants.
# Supported formats: .vcf, .vcf.gz, .csv
sv_lookup_file = "1kg.subset.csv"

# txt file with one row for each sample ID
sample_id_file = "sample_ids.txt"

# Per-sample mean insert size file (two columns: sample_id, mean_insert_size).
# If this file is absent a uniform default of default_insert_size bp is written
# automatically.
insert_size_file = "insert_sizes.csv"

# Ancestry file with required columns "Sample name" and "Superpopulation code"
ancestry_file = "ancestry.tsv"

# Reference genome file
reference_genome_file = "hg38.fa"

# use these paths when running scripts.calibrate_model
# sv_lookup_file = "deletions.csv"
# sample_id_file = "lr_sample_ids.txt"

# ------------------------------------------------------------------------------
# [stix] — Paths to the STIX executable and index
# Required only when querying variants that have not been previously cached in
# stix_output_dir.
# ------------------------------------------------------------------------------
[stix]

# Absolute path to the compiled STIX binary.
bin = "/Users/vili4418/sv/stix/bin/stix"

# Absolute path to the STIX index file
index = "/scratch/Shares/layer/stix/indices/1kg_high_coverage_vivian/shard"

# Absolute path to the STIX database.
database = "/scratch/Shares/layer/stix/indices/1kg_high_coverage_vivian/shard"

# Number of shards the index and database are split into.
# Set to 1 if your index is a single file.
num_shards = 8

# ------------------------------------------------------------------------------
# [query] — Read-level querying parameters
# ------------------------------------------------------------------------------
[query]

# Fraction of the SV length that a flanking read is allowed to overlap the SV
# region and still be included.
# 1.0 = full overlap allowed; 0.5 = half the SV length.
read_overlap = 0.6

# ------------------------------------------------------------------------------
# [model] — Gaussian mixture model / Dirichlet process parameters
# These are passed directly into the GMM; leave a value commented out to use the
# model's built-in default.
# ------------------------------------------------------------------------------
[model]
# Default insert size (bp) written when insert_size_file is missing. Only used
# if the file above does not exist.
default_insert_size = 450

# Initialization method for GMM clustering. Supported algorithms: dp_k-means++, k-means++ or random.
init = "random"

# Whether to apply cluster repulsion to GMM clustering
repulsion = "True"

# Used if repulsion is True. Interaction radius for the repulsive force
r_threshold = 0.4

# Used if repulsion is True. Repulsion stepsize
repulsion_stepsize = 1
# set stepsize to 6 for synthetic data

# Model comparison function to use for selecting the best model. Supported options: AIC, BIC, ICL
model_comparison_func = "bic"

# DEPRECATED
# Distance threshold for merging nearby read clusters (bp).
d_threshold = 500

# Maximum penalty term for spurious cluster suppression.
max_penalty = 537

# ------------------------------------------------------------------------------
# [calibrate] — Model calibration parameters
# These are used to determine the bounds for calibration.
# ------------------------------------------------------------------------------
[calibrate]

# Truth set to calibrate against (in input_dir).
# Required columns: chr, start, stop, n_svs_actual
truth_set = "sv_subset.csv"

# Search function to use for calibration.
# Supported algorithms: bo (bayesian optimization) or grid (grid search)
search_func = "bo"

# Total number of trials
n_trials = 30

# HYPERPARAMETER BOUNDARIES
# Specify the min and max values the parameter can take. If using grid search,
# specify the step size as well.

# Fraction of the SV length that a flanking read is allowed to overlap the SV
# region and still be included.
q_min = 1.0
q_max = 1.0
q_step = 0.1

# Interaction radius for the repulsive force
r_min = 0.4
r_max = 0.95
r_step = 0.05

# Repulsion stepsize
epsilon_min = 1
epsilon_max = 25
epsilon_step = 1

# DEPRECATED

# Minimum distance between SV cluster centroids in L, length space at which to
# start penalizing the model.
d_min = 50
d_max = 500
d_step = 50

# Maximum penalty term for spurious cluster suppression.
p_min = 100
p_max = 1000
p_step = 100


# ------------------------------------------------------------------------------
# [bedtools] — Path to the bedtools executable
# Required for analysis
# ------------------------------------------------------------------------------
[bedtools]

# Absolute path to the compiled bedtools binary.
bin = "/Users/vili4418/sv/bedtools/bin/bedtools"

# ------------------------------------------------------------------------------
# [samtools] — Path to the samtools executable
# Required to extract insert size information using BAM/CRAM files when insert_size_file is not provided.
# ------------------------------------------------------------------------------
[samtools]

# Absolute path to the compiled bedtools binary.
bin = "/Users/vili4418/sv/samtools-1.21/samtools"
